name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify formatting, lint, types, unit tests and builds
        run: pnpm verify
        env:
          DATABASE_URL: postgresql://zalo_shop:local_development_only@localhost:5432/zalo_shop?schema=public
          REDIS_URL: redis://localhost:6379/1
          S3_ACCESS_KEY: minio_local
          S3_BUCKET: zalo-shop-local
          S3_ENDPOINT: http://localhost:9000
          S3_FORCE_PATH_STYLE: 'true'
          S3_REGION: us-east-1
          S3_SECRET_KEY: minio_local_development_only

      - name: Start local dependencies
        run: pnpm infra:up

      - name: Initialize test database
        run: |
          pnpm exec dotenv -e .env.test.example -- pnpm --filter @zalo-shop/database migrate:deploy
          pnpm exec dotenv -e .env.test.example -- pnpm --filter @zalo-shop/database seed

      - name: Run infrastructure integration tests
        run: pnpm test:integration

      - name: Install browser test engines
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run browser end-to-end tests
        run: pnpm test:e2e

      - name: Upload browser test evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Show dependency logs after a failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop local dependencies
        if: always()
        run: docker compose down --volumes --remove-orphans

      - name: Scan tracked files for secrets
        uses: gitleaks/gitleaks-action@v2
