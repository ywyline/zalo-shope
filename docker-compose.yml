name: zalo-shop-local

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zalo_shop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_development_only}
      POSTGRES_RUNTIME_PASSWORD: ${POSTGRES_RUNTIME_PASSWORD:-local_runtime_only}
      POSTGRES_RUNTIME_USER: ${POSTGRES_RUNTIME_USER:-zalo_shop_runtime}
      POSTGRES_USER: ${POSTGRES_USER:-zalo_shop}
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./packages/database/docker/init-runtime-role.sh:/docker-entrypoint-initdb.d/10-runtime-role.sh:ro
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio_local}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio_local_development_only}
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio_local}
      S3_BUCKET: ${S3_BUCKET:-zalo-shop-local}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio_local_development_only}
    entrypoint:
      - /bin/sh
      - -c
      - mc alias set local http://minio:9000 "$${S3_ACCESS_KEY}" "$${S3_SECRET_KEY}" && mc mb --ignore-existing "local/$${S3_BUCKET}"

volumes:
  minio-data:
  postgres-data:
  redis-data:
