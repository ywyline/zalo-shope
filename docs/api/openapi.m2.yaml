openapi: 3.1.0
info:
  title: Zalo Shop M2 Catalog and Content API
  version: 0.2.8-m2
  description: >-
    M2.1 冻结草案；作为 openapi.m1.yaml 的向后兼容增量，定义品牌、类目、属性模板、
    商品、SKU、媒体、合规和页面装修接口。实现必须从受信 X-Store-Code 与认证主体解析商城，
    不接受请求体中的 store_id。M2.3-M2.5 已实现后台目录、商品、媒体、合规和页面装修路径；
    M2.6 已实现 Buyer catalog 路径及短期签名媒体读取；M2.7 新增受限 UTF-8 CSV
    草稿导入、不可变商品版本读取及逐项事务化批量停用/主类目移动；M2.8.1
    新增商品非规格属性读取、类型安全全量替换及越南语必填属性发布门禁。
servers:
  - url: http://localhost:3000
tags:
  - { name: Buyer catalog }
  - { name: Admin catalog }
  - { name: Admin compliance }
  - { name: Admin media }
  - { name: Admin content }
paths:
  /v1/catalog/home:
    get:
      tags: [Buyer catalog]
      summary: 读取当前商城和语言下已发布的首页版本
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/Locale'
      responses:
        '200':
          description: 当前有效首页模块
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HomePage' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/catalog/brands:
    get:
      tags: [Buyer catalog]
      summary: 游标分页读取启用品牌
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: recommended
          in: query
          schema: { type: boolean }
      responses:
        '200': { $ref: '#/components/responses/BrandPage' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/catalog/brands/{brandCode}:
    get:
      tags: [Buyer catalog]
      summary: 按当前商城业务编码读取启用品牌
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/BrandCode'
      responses:
        '200':
          description: 品牌详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Brand' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/catalog/categories:
    get:
      tags: [Buyer catalog]
      summary: 读取当前商城启用的两级类目树
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/Locale'
      responses:
        '200':
          description: 类目树
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Category' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/catalog/products:
    get:
      tags: [Buyer catalog]
      summary: 结构化筛选当前商城已发布商品；全文搜索属于 M3
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: brand_code
          in: query
          schema: { $ref: '#/components/schemas/CatalogCode' }
        - name: category_code
          in: query
          schema: { $ref: '#/components/schemas/CatalogCode' }
        - name: sort
          in: query
          schema: { type: string, enum: [newest, price_asc, price_desc], default: newest }
      responses:
        '200': { $ref: '#/components/responses/ProductPage' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/catalog/products/{productCode}:
    get:
      tags: [Buyer catalog]
      summary: 读取当前商城已发布商品详情与启用 SKU
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ProductCode'
      responses:
        '200':
          description: 商品详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductDetail' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/brands:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
    get:
      tags: [Admin catalog]
      summary: 读取商城品牌
      security: [{ bearerAuth: [] }]
      responses:
        '200': { $ref: '#/components/responses/BrandPage' }
        '403': { $ref: '#/components/responses/Error' }
    post:
      tags: [Admin catalog]
      summary: 创建商城品牌；需要 store.catalog.manage
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BrandInput' }
      responses:
        '201':
          description: 已创建品牌
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminBrand' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/brands/{brandId}:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
      - $ref: '#/components/parameters/BrandId'
    patch:
      tags: [Admin catalog]
      summary: 使用 expected_version 编辑或停用品牌；不提供物理删除
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BrandUpdate' }
      responses:
        '200':
          description: 已更新品牌
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminBrand' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/categories:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
    get:
      tags: [Admin catalog]
      summary: 读取含停用项的商城类目树
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 管理类目树
    post:
      tags: [Admin catalog]
      summary: 创建根或二级类目；需要 store.catalog.manage
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryInput' }
      responses:
        '201': { description: 已创建类目 }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/categories/{categoryId}:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
      - name: categoryId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Admin catalog]
      summary: 排序、移动或停用类目；最多两级且不提供物理删除
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryUpdate' }
      responses:
        '200': { description: 已更新类目 }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/categories/{categoryId}/attribute-templates/{templateVersionId}:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
      - name: categoryId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: templateVersionId
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      tags: [Admin catalog]
      summary: 幂等绑定同商城已激活模板版本，可设为类目主模板
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryTemplateBinding' }
      responses:
        '200': { description: 已绑定 }
        '404': { $ref: '#/components/responses/Error' }
    delete:
      tags: [Admin catalog]
      summary: 解绑类目模板版本关系；不删除模板版本
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: 已解绑 }
        '404': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/attribute-templates:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
    get:
      tags: [Admin catalog]
      summary: 读取属性模板及不可变版本
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: 模板列表 } }
    post:
      tags: [Admin catalog]
      summary: 创建属性模板草稿
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AttributeTemplateInput' }
      responses: { '201': { description: 模板及第一个草稿版本 } }
  /v1/admin/catalog/attribute-templates/{templateId}/versions:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
      - $ref: '#/components/parameters/TemplateId'
    post:
      tags: [Admin catalog]
      summary: 在不存在未完成草稿时创建下一模板版本
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AttributeTemplateVersionInput' }
      responses:
        '201': { description: 新草稿版本 }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/attribute-templates/{templateId}/versions/{version}:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
      - $ref: '#/components/parameters/TemplateId'
      - $ref: '#/components/parameters/TemplateVersion'
    patch:
      tags: [Admin catalog]
      summary: 使用模板乐观版本号替换草稿定义；已激活版本不可修改
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AttributeTemplateVersionUpdate' }
      responses:
        '200': { description: 已更新草稿版本 }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/attribute-templates/{templateId}/versions/{version}/activate:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
      - $ref: '#/components/parameters/TemplateId'
      - $ref: '#/components/parameters/TemplateVersion'
    post:
      tags: [Admin catalog]
      summary: 激活不可变模板版本；需要 store.catalog.publish
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AttributeTemplateActivation' }
      responses:
        '201': { description: 已激活版本 }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/products:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
    get:
      tags: [Admin catalog]
      summary: 按商城读取商品草稿与发布状态
      security: [{ bearerAuth: [] }]
      responses: { '200': { $ref: '#/components/responses/ProductPage' } }
    post:
      tags: [Admin catalog]
      summary: 创建商品草稿；请求体不含 store_id
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductDraftInput' }
      responses:
        '201': { description: 商品草稿 }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/products/imports/template.csv:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
    get:
      tags: [Admin catalog]
      summary: 下载冻结表头的 UTF-8 CSV 商品草稿导入模板；需要 store.catalog.read
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 带 UTF-8 BOM 的 CSV 模板；不含库存、状态、商城或发布字段
          headers:
            Content-Disposition:
              schema: { type: string }
          content:
            text/csv:
              schema: { type: string }
        '403': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/products/imports/csv:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
      - name: dry_run
        in: query
        schema: { type: boolean, default: true }
    post:
      tags: [Admin catalog]
      summary: 校验或导入 UTF-8 CSV 商品与 SKU 草稿；需要 store.catalog.manage
      description: >-
        单文件最多 2 MiB、2,000 个数据行；同商品全部 SKU 在一个事务中创建，不同商品允许部分成功。
        dry_run 不写数据库；实际导入不创建库存、媒体、合规审批或发布版本。
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '201':
          description: 逐行校验/导入结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductImportReport' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/products/batch/disable:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
    post:
      tags: [Admin catalog]
      summary: 逐项事务化批量停用商品并保留历史版本；需要 store.catalog.publish
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BatchDisableProductsInput' }
      responses:
        '201':
          description: 最多 100 项的部分成功报告
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchProductResult' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/products/batch/move:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
    post:
      tags: [Admin catalog]
      summary: 逐项事务化移动草稿主类目；需要 store.catalog.manage
      description: >-
        只允许 DRAFT/UNPUBLISHED；目标必须是同商城启用末级类目。商品已有 SKU/属性值时禁止跨属性模板移动。
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BatchMoveProductsInput' }
      responses:
        '201':
          description: 最多 100 项的部分成功报告
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchProductResult' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/products/{productId}/versions:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Admin catalog]
      summary: 读取同商城不可变商品发布版本元数据；需要 store.catalog.read
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 按版本倒序返回
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ProductVersionMetadata' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/products/{productId}/versions/{version}:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/ProductVersion'
    get:
      tags: [Admin catalog]
      summary: 读取同商城不可变商品发布版本快照；需要 store.catalog.read
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 版本及完整快照
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductVersionDetail' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/products/{productId}/attributes:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Admin catalog]
      summary: 读取商品固定模板、非规格定义和当前属性值；需要 store.catalog.read
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 不含 SKU 规格和成本价的属性编辑器投影
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductAttributeEditor' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
    put:
      tags: [Admin catalog]
      summary: 以 expected_version 全量替换草稿非规格属性；需要 store.catalog.manage
      description: >-
        只允许 DRAFT/UNPUBLISHED。属性必须属于商品固定模板且不是 SPECIFICATION；全部输入先校验，
        删除重建、商品版本递增和 catalog.product.attributes_replaced 审计在同一商城事务内完成。
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReplaceProductAttributesInput' }
      responses:
        '200':
          description: 更新后的属性编辑器投影
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductAttributeEditor' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/products/{productId}/skus:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
      - $ref: '#/components/parameters/ProductId'
    put:
      tags: [Admin catalog]
      summary: 以 expected_version 替换商品草稿 SKU 集合
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [expected_version, skus]
              properties:
                expected_version: { type: integer, minimum: 1 }
                skus:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items: { $ref: '#/components/schemas/SkuDraftInput' }
      responses:
        '200': { description: 已更新 SKU }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/products/{productId}/media:
    post:
      tags: [Admin catalog]
      summary: 以 expected_version 关联已 READY 的同商城商品媒体
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/StoreIdQuery'
        - $ref: '#/components/parameters/AccessReason'
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductMediaInput' }
      responses:
        '201': { description: 已关联媒体并递增商品版本 }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/products/{productId}/submit:
    post:
      tags: [Admin catalog]
      summary: 提交发布审核并返回完整门禁问题；需要 store.catalog.publish
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/StoreIdQuery'
        - $ref: '#/components/parameters/AccessReason'
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductVersionCommand' }
      responses:
        '201':
          description: 门禁决定
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicationDecision' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/catalog/products/{productId}/publish:
    post:
      tags: [Admin catalog]
      summary: 重新校验门禁并发布不可变版本；需要 store.catalog.publish
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/StoreIdQuery'
        - $ref: '#/components/parameters/AccessReason'
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductVersionCommand' }
      responses:
        '201': { description: 已发布商品版本 }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/compliance/records:
    post:
      tags: [Admin compliance]
      summary: 提交同商城商品合规资料；需要 store.catalog.manage + store.compliance.read
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/StoreIdQuery'
        - $ref: '#/components/parameters/AccessReason'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ComplianceSubmissionInput' }
      responses:
        '201': { description: 待审核合规记录 }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/compliance/overview:
    get:
      tags: [Admin compliance]
      summary: 读取同商城合规要求与脱敏记录摘要；需要 store.compliance.read
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/StoreIdQuery'
        - $ref: '#/components/parameters/AccessReason'
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: product_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [DRAFT, PENDING_REVIEW, APPROVED, REJECTED, SUPERSEDED] }
      responses:
        '200':
          description: 不含原始证件号、文件对象键、下载地址和操作人标识的合规工作台读模型
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ComplianceOverview' }
        '403': { $ref: '#/components/responses/Error' }
  /v1/admin/compliance/records/{recordId}/review:
    post:
      tags: [Admin compliance]
      summary: 追加批准或驳回结果；提交人不能审核；需要 store.compliance.review
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/StoreIdQuery'
        - $ref: '#/components/parameters/AccessReason'
        - name: recordId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [decision, review_note]
              properties:
                decision: { type: string, enum: [APPROVED, REJECTED] }
                review_note: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        '201': { description: 不可变审核结果 }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/media/uploads:
    post:
      tags: [Admin media]
      summary: 校验媒体元数据并签发短期商城隔离上传目标
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/StoreIdQuery'
        - $ref: '#/components/parameters/AccessReason'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MediaUploadInput' }
      responses:
        '201': { description: 短期上传目标；不表示媒体已 READY }
        '413': { $ref: '#/components/responses/Error' }
  /v1/admin/media/{mediaId}/confirm:
    post:
      tags: [Admin media]
      summary: 核对对象大小、类型与签名 checksum 后确认；SVG 未清洗时隔离
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/StoreIdQuery'
        - $ref: '#/components/parameters/AccessReason'
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MediaConfirmationInput' }
      responses:
        '201': { description: READY 或 QUARANTINED 媒体记录 }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/content/pages:
    parameters:
      - $ref: '#/components/parameters/StoreCode'
      - $ref: '#/components/parameters/StoreIdQuery'
      - $ref: '#/components/parameters/AccessReason'
    get:
      tags: [Admin content]
      summary: 读取商城页面及版本
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: 页面列表 } }
    post:
      tags: [Admin content]
      summary: 创建页面草稿；需要 store.content.manage
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PageDraftCreation' }
      responses:
        '201': { description: 页面及首个空草稿版本 }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/content/pages/{pageId}/draft:
    put:
      tags: [Admin content]
      summary: 以完整模块列表替换可编辑草稿；无草稿时创建下一版本
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/StoreIdQuery'
        - $ref: '#/components/parameters/AccessReason'
        - name: pageId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PageDraftReplacement' }
      responses:
        '200': { description: 已更新页面草稿 }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/admin/content/pages/{pageId}/publish:
    post:
      tags: [Admin content]
      summary: 校验三语、媒体、时间窗及商城内目标后发布不可变版本
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreCode'
        - $ref: '#/components/parameters/StoreIdQuery'
        - $ref: '#/components/parameters/AccessReason'
        - name: pageId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PagePublicationCommand' }
      responses:
        '201': { description: 已发布页面；原发布版本保持不可变 }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    StoreCode:
      name: X-Store-Code
      in: header
      required: true
      schema: { type: string, minLength: 2, maxLength: 64 }
    Locale:
      name: locale
      in: query
      required: false
      schema: { type: string, enum: [vi, zh, en], default: vi }
    AccessReason:
      name: X-Access-Reason
      in: header
      required: false
      schema: { type: string, minLength: 10, maxLength: 500 }
    StoreIdQuery:
      name: store_id
      in: query
      required: true
      schema: { type: string, format: uuid }
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string, minLength: 1, maxLength: 1000 }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    BrandCode:
      name: brandCode
      in: path
      required: true
      schema: { $ref: '#/components/schemas/CatalogCode' }
    ProductCode:
      name: productCode
      in: path
      required: true
      schema: { $ref: '#/components/schemas/CatalogCode' }
    BrandId:
      name: brandId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TemplateId:
      name: templateId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TemplateVersion:
      name: version
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
    ProductId:
      name: productId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProductVersion:
      name: version
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
  responses:
    Error:
      description: 稳定错误信封，不泄露其他商城对象是否存在
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BrandPage:
      description: 品牌游标页
      content:
        application/json:
          schema:
            type: object
            required: [items]
            properties:
              items: { type: array, items: { $ref: '#/components/schemas/Brand' } }
              next_cursor: { type: [string, 'null'] }
    ProductPage:
      description: 商品游标页
      content:
        application/json:
          schema:
            type: object
            required: [items]
            properties:
              items: { type: array, items: { $ref: '#/components/schemas/ProductSummary' } }
              next_cursor: { type: [string, 'null'] }
  schemas:
    CatalogCode:
      type: string
      minLength: 2
      maxLength: 64
      pattern: '^[a-z][a-z0-9-]*$'
    LocaleResolution:
      type: object
      required: [requested_locale, resolved_locale]
      properties:
        requested_locale: { type: string, enum: [vi, zh, en] }
        resolved_locale: { type: string, enum: [vi, zh, en] }
    LocalizationInput:
      type: object
      additionalProperties: false
      required: [locale, name, description, selling_points]
      properties:
        locale: { type: string, enum: [vi, zh, en] }
        name: { type: string, minLength: 1, maxLength: 240 }
        description: { type: [string, 'null'], maxLength: 20000 }
        selling_points: { type: [string, 'null'], maxLength: 2000 }
    CatalogAdminLocalizationInput:
      type: object
      additionalProperties: false
      required: [locale, name]
      properties:
        locale: { type: string, enum: [vi, zh, en] }
        name: { type: string, minLength: 1, maxLength: 240 }
        description: { type: [string, 'null'], maxLength: 20000 }
        share_title: { type: [string, 'null'], maxLength: 240 }
        share_summary: { type: [string, 'null'], maxLength: 500 }
    Brand:
      allOf:
        - $ref: '#/components/schemas/LocaleResolution'
        - type: object
          required: [code, name, recommended]
          properties:
            code: { $ref: '#/components/schemas/CatalogCode' }
            name: { type: string }
            introduction: { type: [string, 'null'] }
            recommended: { type: boolean }
            logo: { $ref: '#/components/schemas/PublicMedia' }
    AdminBrand:
      allOf:
        - $ref: '#/components/schemas/Brand'
        - type: object
          required: [id, status, version]
          properties:
            id: { type: string, format: uuid }
            status: { type: string, enum: [ACTIVE, DISABLED] }
            version: { type: integer, minimum: 1 }
    BrandInput:
      type: object
      additionalProperties: false
      required: [code, localizations]
      properties:
        code: { $ref: '#/components/schemas/CatalogCode' }
        country_code: { type: [string, 'null'], pattern: '^[A-Z]{2}$' }
        official_website: { type: [string, 'null'], format: uri, pattern: '^https://' }
        recommended: { type: boolean, default: false }
        sort_order: { type: integer, minimum: 0, default: 0 }
        localizations:
          type: array
          minItems: 1
          maxItems: 3
          items: { $ref: '#/components/schemas/CatalogAdminLocalizationInput' }
    BrandUpdate:
      type: object
      additionalProperties: false
      required: [expected_version]
      properties:
        expected_version: { type: integer, minimum: 1 }
        country_code: { type: [string, 'null'], pattern: '^[A-Z]{2}$' }
        official_website: { type: [string, 'null'], format: uri, pattern: '^https://' }
        recommended: { type: boolean }
        sort_order: { type: integer, minimum: 0 }
        status: { type: string, enum: [ACTIVE, DISABLED] }
        localizations:
          type: array
          minItems: 1
          maxItems: 3
          items: { $ref: '#/components/schemas/CatalogAdminLocalizationInput' }
    Category:
      allOf:
        - $ref: '#/components/schemas/LocaleResolution'
        - type: object
          required: [children, code, depth, description, media, name]
          properties:
            code: { $ref: '#/components/schemas/CatalogCode' }
            depth: { type: integer, enum: [1, 2] }
            name: { type: string }
            description: { type: [string, 'null'] }
            media: { $ref: '#/components/schemas/PublicMedia' }
            children: { type: array, items: { $ref: '#/components/schemas/Category' } }
    CategoryInput:
      type: object
      additionalProperties: false
      required: [code, localizations]
      properties:
        code: { $ref: '#/components/schemas/CatalogCode' }
        parent_id: { type: [string, 'null'], format: uuid }
        sort_order: { type: integer, minimum: 0, default: 0 }
        localizations:
          type: array
          minItems: 1
          maxItems: 3
          items: { $ref: '#/components/schemas/CatalogAdminLocalizationInput' }
    CategoryUpdate:
      type: object
      additionalProperties: false
      required: [expected_version]
      properties:
        expected_version: { type: integer, minimum: 1 }
        parent_id: { type: [string, 'null'], format: uuid }
        sort_order: { type: integer, minimum: 0 }
        status: { type: string, enum: [ACTIVE, DISABLED] }
        localizations:
          type: array
          minItems: 1
          maxItems: 3
          items: { $ref: '#/components/schemas/CatalogAdminLocalizationInput' }
    CategoryTemplateBinding:
      type: object
      additionalProperties: false
      properties:
        is_primary: { type: boolean, default: false }
    AttributeOptionInput:
      type: object
      additionalProperties: false
      required: [code, label_vi]
      properties:
        code: { $ref: '#/components/schemas/CatalogCode' }
        label_vi: { type: string, minLength: 1, maxLength: 160 }
        label_zh: { type: [string, 'null'], minLength: 1, maxLength: 160 }
        label_en: { type: [string, 'null'], minLength: 1, maxLength: 160 }
        sort_order: { type: integer, minimum: 0, default: 0 }
    AttributeDefinitionInput:
      type: object
      additionalProperties: false
      required: [code, data_type, label_vi, purpose]
      properties:
        code: { $ref: '#/components/schemas/CatalogCode' }
        data_type: { type: string, enum: [TEXT, INTEGER, DECIMAL, BOOLEAN, DATE, OPTION] }
        purpose: { type: string, enum: [SPECIFICATION, FILTER, DETAIL, COMPLIANCE] }
        label_vi: { type: string, minLength: 1, maxLength: 160 }
        label_zh: { type: [string, 'null'], minLength: 1, maxLength: 160 }
        label_en: { type: [string, 'null'], minLength: 1, maxLength: 160 }
        required: { type: boolean, default: false }
        multiple: { type: boolean, default: false }
        filterable: { type: boolean, default: false }
        unit: { type: [string, 'null'], minLength: 1, maxLength: 32 }
        sort_order: { type: integer, minimum: 0, default: 0 }
        validation_rules: { type: object, default: {} }
        options:
          type: array
          maxItems: 200
          items: { $ref: '#/components/schemas/AttributeOptionInput' }
    AttributeTemplateVersionInput:
      type: object
      additionalProperties: false
      required: [definitions, name]
      properties:
        name: { type: string, minLength: 1, maxLength: 160 }
        definitions:
          type: array
          minItems: 1
          maxItems: 100
          items: { $ref: '#/components/schemas/AttributeDefinitionInput' }
    AttributeTemplateInput:
      allOf:
        - $ref: '#/components/schemas/AttributeTemplateVersionInput'
        - type: object
          required: [code]
          properties:
            code: { $ref: '#/components/schemas/CatalogCode' }
      unevaluatedProperties: false
    AttributeTemplateVersionUpdate:
      allOf:
        - $ref: '#/components/schemas/AttributeTemplateVersionInput'
        - type: object
          required: [expected_template_version]
          properties:
            expected_template_version: { type: integer, minimum: 1 }
      unevaluatedProperties: false
    AttributeTemplateActivation:
      type: object
      additionalProperties: false
      required: [expected_template_version]
      properties:
        expected_template_version: { type: integer, minimum: 1 }
    ProductDraftInput:
      type: object
      additionalProperties: false
      required: [brand_id, code, localizations, main_category_id]
      properties:
        brand_id: { type: string, format: uuid }
        code: { $ref: '#/components/schemas/CatalogCode' }
        main_category_id: { type: string, format: uuid }
        secondary_category_ids:
          type: array
          maxItems: 20
          uniqueItems: true
          items: { type: string, format: uuid }
        localizations:
          type: array
          minItems: 1
          maxItems: 3
          items: { $ref: '#/components/schemas/LocalizationInput' }
    ProductVersionCommand:
      type: object
      additionalProperties: false
      required: [expected_version]
      properties:
        expected_version: { type: integer, minimum: 1 }
    ProductAttributeValue:
      oneOf:
        - type: object
          additionalProperties: false
          required: [attribute_code, data_type, locale, value]
          properties:
            attribute_code: { $ref: '#/components/schemas/CatalogCode' }
            data_type: { type: string, const: TEXT }
            locale: { type: string, enum: [vi, zh, en] }
            value: { type: string, minLength: 1, maxLength: 20000 }
        - type: object
          additionalProperties: false
          required: [attribute_code, data_type, value]
          properties:
            attribute_code: { $ref: '#/components/schemas/CatalogCode' }
            data_type: { type: string, const: INTEGER }
            value:
              type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
        - type: object
          additionalProperties: false
          required: [attribute_code, data_type, value]
          properties:
            attribute_code: { $ref: '#/components/schemas/CatalogCode' }
            data_type: { type: string, const: DECIMAL }
            value:
              type: string
              pattern: '^-?(?:0|[1-9]\d{0,15})(?:\.\d{1,8})?$'
        - type: object
          additionalProperties: false
          required: [attribute_code, data_type, value]
          properties:
            attribute_code: { $ref: '#/components/schemas/CatalogCode' }
            data_type: { type: string, const: BOOLEAN }
            value: { type: boolean }
        - type: object
          additionalProperties: false
          required: [attribute_code, data_type, value]
          properties:
            attribute_code: { $ref: '#/components/schemas/CatalogCode' }
            data_type: { type: string, const: DATE }
            value: { type: string, format: date }
        - type: object
          additionalProperties: false
          required: [attribute_code, data_type, option_code]
          properties:
            attribute_code: { $ref: '#/components/schemas/CatalogCode' }
            data_type: { type: string, const: OPTION }
            option_code: { $ref: '#/components/schemas/CatalogCode' }
    ReplaceProductAttributesInput:
      type: object
      additionalProperties: false
      required: [expected_version, values]
      properties:
        expected_version: { type: integer, minimum: 1 }
        values:
          type: array
          maxItems: 500
          uniqueItems: true
          items: { $ref: '#/components/schemas/ProductAttributeValue' }
    ProductAttributeEditor:
      type: object
      additionalProperties: false
      required:
        - definitions
        - editable
        - product_id
        - product_status
        - product_version
        - template_version
        - values
      properties:
        product_id: { type: string, format: uuid }
        product_status:
          type: string
          enum: [DRAFT, PENDING_REVIEW, PUBLISHED, UNPUBLISHED, DISABLED]
        product_version: { type: integer, minimum: 1 }
        editable: { type: boolean }
        template_version:
          type: object
          additionalProperties: false
          required: [id, name, version]
          properties:
            id: { type: string, format: uuid }
            name: { type: string, minLength: 1, maxLength: 160 }
            version: { type: integer, minimum: 1 }
        definitions:
          type: array
          maxItems: 100
          items:
            type: object
            additionalProperties: false
            required:
              - code
              - data_type
              - filterable
              - labels
              - multiple
              - options
              - purpose
              - required
              - sort_order
              - unit
              - validation_rules
            properties:
              code: { $ref: '#/components/schemas/CatalogCode' }
              data_type: { type: string, enum: [TEXT, INTEGER, DECIMAL, BOOLEAN, DATE, OPTION] }
              purpose: { type: string, enum: [FILTER, DETAIL, COMPLIANCE] }
              required: { type: boolean }
              multiple: { type: boolean }
              filterable: { type: boolean }
              unit: { type: [string, 'null'], maxLength: 32 }
              sort_order: { type: integer, minimum: 0 }
              validation_rules: { type: object }
              labels:
                type: object
                additionalProperties: false
                required: [en, vi, zh]
                properties:
                  vi: { type: string, minLength: 1, maxLength: 160 }
                  zh: { type: [string, 'null'], minLength: 1, maxLength: 160 }
                  en: { type: [string, 'null'], minLength: 1, maxLength: 160 }
              options:
                type: array
                maxItems: 200
                items:
                  type: object
                  additionalProperties: false
                  required: [code, labels, sort_order]
                  properties:
                    code: { $ref: '#/components/schemas/CatalogCode' }
                    sort_order: { type: integer, minimum: 0 }
                    labels:
                      type: object
                      additionalProperties: false
                      required: [en, vi, zh]
                      properties:
                        vi: { type: string, minLength: 1, maxLength: 160 }
                        zh: { type: [string, 'null'], minLength: 1, maxLength: 160 }
                        en: { type: [string, 'null'], minLength: 1, maxLength: 160 }
        values:
          type: array
          maxItems: 500
          items: { $ref: '#/components/schemas/ProductAttributeValue' }
    ProductImportReport:
      type: object
      required: [dry_run, rows, summary]
      properties:
        dry_run: { type: boolean }
        rows:
          type: array
          maxItems: 2000
          items:
            type: object
            required: [errors, line, product_code, status]
            properties:
              line: { type: integer, minimum: 2 }
              product_code: { type: string }
              product_id: { type: string, format: uuid }
              status: { type: string, enum: [FAILED, IMPORTED, VALIDATED] }
              errors:
                type: array
                items:
                  type: object
                  required: [code, message]
                  properties:
                    code: { type: string }
                    message: { type: string }
        summary:
          type: object
          required:
            - products_failed
            - products_imported
            - products_validated
            - rows_failed
            - rows_imported
            - rows_total
            - rows_validated
          properties:
            products_failed: { type: integer, minimum: 0 }
            products_imported: { type: integer, minimum: 0 }
            products_validated: { type: integer, minimum: 0 }
            rows_failed: { type: integer, minimum: 0 }
            rows_imported: { type: integer, minimum: 0 }
            rows_total: { type: integer, minimum: 0, maximum: 2000 }
            rows_validated: { type: integer, minimum: 0 }
    BatchProductItem:
      type: object
      additionalProperties: false
      required: [expected_version, product_id]
      properties:
        expected_version: { type: integer, minimum: 1 }
        product_id: { type: string, format: uuid }
    BatchDisableProductsInput:
      type: object
      additionalProperties: false
      required: [confirmation_code, items]
      properties:
        confirmation_code: { type: string, const: DISABLE }
        items:
          type: array
          minItems: 1
          maxItems: 100
          items: { $ref: '#/components/schemas/BatchProductItem' }
    BatchMoveProductsInput:
      type: object
      additionalProperties: false
      required: [confirmation_code, items, main_category_id]
      properties:
        confirmation_code: { type: string, const: MOVE }
        main_category_id: { type: string, format: uuid }
        items:
          type: array
          minItems: 1
          maxItems: 100
          items: { $ref: '#/components/schemas/BatchProductItem' }
    BatchProductResult:
      type: object
      required: [results, summary]
      properties:
        results:
          type: array
          maxItems: 100
          items:
            type: object
            required: [product_id, status]
            properties:
              product_id: { type: string, format: uuid }
              status: { type: string, enum: [SUCCEEDED, FAILED] }
              version: { type: integer, minimum: 1 }
              error:
                type: object
                required: [code, message]
                properties:
                  code: { type: string, enum: [CONFLICT, RESOURCE_NOT_FOUND] }
                  message: { type: string }
        summary:
          type: object
          required: [failed, succeeded, total]
          properties:
            failed: { type: integer, minimum: 0 }
            succeeded: { type: integer, minimum: 0 }
            total: { type: integer, minimum: 1, maximum: 100 }
    ProductVersionMetadata:
      type: object
      required: [contentHash, createdAt, createdBy, publicationStatus, version]
      properties:
        contentHash: { type: string, pattern: '^[a-f0-9]{64}$' }
        createdAt: { type: string, format: date-time }
        createdBy: { type: string, format: uuid }
        publicationStatus: { type: string, enum: [DRAFT, PUBLISHED, WITHDRAWN] }
        publishedAt: { type: [string, 'null'], format: date-time }
        publishedBy: { type: [string, 'null'], format: uuid }
        version: { type: integer, minimum: 1 }
        withdrawnAt: { type: [string, 'null'], format: date-time }
        withdrawnBy: { type: [string, 'null'], format: uuid }
    ProductVersionDetail:
      allOf:
        - $ref: '#/components/schemas/ProductVersionMetadata'
        - type: object
          required: [id, productId, snapshot, storeId]
          properties:
            id: { type: string, format: uuid }
            productId: { type: string, format: uuid }
            snapshot:
              type: object
              description: 完整数据库快照的运营视图；递归移除 costPriceVnd/cost_price_vnd
            storeId: { type: string, format: uuid }
    ProductMediaInput:
      type: object
      additionalProperties: false
      required: [expected_version, media_id, purpose]
      properties:
        expected_version: { type: integer, minimum: 1 }
        media_id: { type: string, format: uuid }
        purpose: { type: string, enum: [PRIMARY, GALLERY] }
        sort_order: { type: integer, minimum: 0, default: 0 }
    SkuOptionInput:
      type: object
      additionalProperties: false
      required: [attribute_code, option_code]
      properties:
        attribute_code: { $ref: '#/components/schemas/CatalogCode' }
        option_code: { $ref: '#/components/schemas/CatalogCode' }
    SkuDraftInput:
      type: object
      additionalProperties: false
      required: [code, enabled, option_values, sale_price_vnd]
      properties:
        code: { $ref: '#/components/schemas/CatalogCode' }
        barcode: { type: [string, 'null'], minLength: 4, maxLength: 64 }
        enabled: { type: boolean }
        sale_price_vnd: { type: integer, minimum: 0 }
        market_price_vnd: { type: [integer, 'null'], minimum: 0 }
        cost_price_vnd: { type: [integer, 'null'], minimum: 0, writeOnly: true }
        weight_grams: { type: [integer, 'null'], minimum: 1 }
        option_values:
          type: array
          minItems: 1
          maxItems: 20
          items: { $ref: '#/components/schemas/SkuOptionInput' }
    PublicSku:
      type: object
      required: [code, market_price_vnd, media, option_values, sale_price_vnd]
      properties:
        code: { $ref: '#/components/schemas/CatalogCode' }
        sale_price_vnd: { type: integer, minimum: 0 }
        market_price_vnd: { type: [integer, 'null'], minimum: 0 }
        media: { $ref: '#/components/schemas/PublicMedia' }
        option_values:
          type: array
          items: { $ref: '#/components/schemas/PublicSkuOption' }
    PublicSkuOption:
      type: object
      required: [attribute_code, attribute_label, option_code, option_label]
      properties:
        attribute_code: { $ref: '#/components/schemas/CatalogCode' }
        attribute_label: { type: string }
        option_code: { $ref: '#/components/schemas/CatalogCode' }
        option_label: { type: string }
    ProductSummary:
      allOf:
        - $ref: '#/components/schemas/LocaleResolution'
        - type: object
          required:
            - brand
            - code
            - main_category
            - market_price_range_vnd
            - name
            - price_range_vnd
            - primary_media
            - selling_points
            - subtitle
          properties:
            code: { $ref: '#/components/schemas/CatalogCode' }
            name: { type: string }
            subtitle: { type: [string, 'null'] }
            selling_points: { type: [string, 'null'] }
            brand: { $ref: '#/components/schemas/Brand' }
            main_category: { $ref: '#/components/schemas/Category' }
            primary_media: { $ref: '#/components/schemas/PublicMedia' }
            price_range_vnd:
              type: object
              required: [minimum, maximum]
              properties:
                minimum: { type: integer, minimum: 0 }
                maximum: { type: integer, minimum: 0 }
            market_price_range_vnd:
              type: [object, 'null']
              required: [minimum, maximum]
              properties:
                minimum: { type: integer, minimum: 0 }
                maximum: { type: integer, minimum: 0 }
    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          required: [attributes, description_document, gallery, skus, usage_instructions]
          properties:
            description_document: { type: object }
            usage_instructions: { type: [string, 'null'] }
            gallery: { type: array, items: { $ref: '#/components/schemas/PublicMediaObject' } }
            attributes:
              type: array
              items: { $ref: '#/components/schemas/PublicProductAttribute' }
            skus: { type: array, items: { $ref: '#/components/schemas/PublicSku' } }
    PublicProductAttribute:
      type: object
      required: [code, label, purpose, unit, value]
      properties:
        code: { $ref: '#/components/schemas/CatalogCode' }
        label: { type: string }
        purpose: { type: string }
        unit: { type: [string, 'null'] }
        value: { type: [string, number, boolean, 'null'] }
    PublicMediaObject:
      type: object
      required: [alt_text, expires_at, height, url, width]
      properties:
        url: { type: string, format: uri }
        alt_text: { type: string }
        width: { type: [integer, 'null'], minimum: 1 }
        height: { type: [integer, 'null'], minimum: 1 }
        expires_at: { type: string, format: date-time }
    PublicMedia:
      oneOf:
        - $ref: '#/components/schemas/PublicMediaObject'
        - type: 'null'
    PublicationDecision:
      type: object
      required: [can_publish, issues]
      properties:
        can_publish: { type: boolean }
        issues:
          type: array
          items:
            type: object
            required: [code]
            properties:
              code: { type: string }
              reference: { type: string }
    MediaUploadInput:
      type: object
      additionalProperties: false
      required: [byte_size, checksum_sha256, filename, mime_type, resource]
      properties:
        filename: { type: string, minLength: 1, maxLength: 255 }
        mime_type: { type: string, enum: [image/svg+xml, image/png, image/webp] }
        byte_size: { type: integer, minimum: 1, maximum: 20971520 }
        checksum_sha256: { type: string, pattern: '^[a-f0-9]{64}$' }
        resource: { type: string, enum: [brand, category, product, sku, page, compliance] }
    MediaConfirmationInput:
      type: object
      additionalProperties: false
      required: [expected_version]
      properties:
        expected_version: { type: integer, minimum: 1 }
        resource: { type: string, enum: [brand, category, product, sku, page, compliance] }
    PageDraftCreation:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code: { $ref: '#/components/schemas/CatalogCode' }
    PagePublicationCommand:
      type: object
      additionalProperties: false
      required: [confirmation_code, expected_version]
      properties:
        confirmation_code: { $ref: '#/components/schemas/CatalogCode' }
        expected_version: { type: integer, minimum: 1 }
    PageDraftReplacement:
      type: object
      additionalProperties: false
      required: [expected_version, modules]
      properties:
        expected_version: { type: integer, minimum: 1 }
        modules:
          type: array
          maxItems: 50
          items: { $ref: '#/components/schemas/PageModuleInput' }
    PageModuleInput:
      type: object
      additionalProperties: false
      required: [localizations, module_type, sort_order]
      properties:
        module_type:
          type: string
          enum: [HERO, BANNER, PRODUCT_GRID, BRAND_GRID, CATEGORY_GRID, RICH_TEXT]
        sort_order: { type: integer, minimum: 0 }
        status: { type: string, enum: [ACTIVE, DISABLED], default: ACTIVE }
        visible_from: { type: [string, 'null'], format: date-time }
        visible_to: { type: [string, 'null'], format: date-time }
        target_type:
          { type: [string, 'null'], enum: [PRODUCT, BRAND, CATEGORY, PAGE, EXTERNAL, null] }
        target_id: { type: [string, 'null'], format: uuid }
        target_url: { type: [string, 'null'], format: uri }
        background_config:
          type: object
          additionalProperties: false
          properties:
            color: { type: [string, 'null'], pattern: '^#[0-9a-fA-F]{6}$' }
            overlay: { type: [number, 'null'], minimum: 0, maximum: 1 }
        localizations:
          type: array
          minItems: 3
          maxItems: 3
          items:
            type: object
            additionalProperties: false
            required: [locale, title]
            properties:
              locale: { type: string, enum: [vi, zh, en] }
              title: { type: string, minLength: 1, maxLength: 240 }
              summary: { type: [string, 'null'], maxLength: 500 }
              button_label: { type: [string, 'null'], maxLength: 160 }
              content_config:
                type: object
                additionalProperties: false
                properties:
                  eyebrow: { type: [string, 'null'], maxLength: 120 }
                  layout: { type: string, enum: [CAROUSEL, GRID, STACK] }
                  item_ids:
                    type: array
                    maxItems: 24
                    items: { type: string, format: uuid }
        media:
          type: array
          maxItems: 10
          items:
            type: object
            additionalProperties: false
            required: [media_id, purpose]
            properties:
              media_id: { type: string, format: uuid }
              purpose: { type: string, enum: [COVER, GALLERY] }
              sort_order: { type: integer, minimum: 0, default: 0 }
    ComplianceSubmissionInput:
      type: object
      additionalProperties: false
      required: [media_ids, product_id, requirement_id]
      properties:
        product_id: { type: string, format: uuid }
        requirement_id: { type: string, format: uuid }
        document_number: { type: [string, 'null'], minLength: 1, maxLength: 255 }
        issued_at: { type: [string, 'null'], format: date }
        expires_at: { type: [string, 'null'], format: date }
        supersedes_record_id: { type: [string, 'null'], format: uuid }
        media_ids:
          type: array
          minItems: 1
          maxItems: 20
          uniqueItems: true
          items: { type: string, format: uuid }
    ComplianceOverview:
      type: object
      additionalProperties: false
      required: [records, requirements]
      properties:
        requirements:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [blocking, category_id, code, document_type, id, version]
            properties:
              id: { type: string, format: uuid }
              code: { $ref: '#/components/schemas/CatalogCode' }
              document_type: { type: string }
              category_id: { type: [string, 'null'], format: uuid }
              blocking: { type: boolean }
              version: { type: integer, minimum: 1 }
        records:
          type: array
          maxItems: 100
          items:
            type: object
            additionalProperties: false
            required:
              - document_number_masked
              - expires_on
              - id
              - issued_on
              - media_count
              - product
              - requirement
              - reviewed_at
              - status
              - submitted_at
              - version
            properties:
              id: { type: string, format: uuid }
              document_number_masked: { type: [string, 'null'] }
              issued_on: { type: [string, 'null'], format: date }
              expires_on: { type: [string, 'null'], format: date }
              media_count: { type: integer, minimum: 0 }
              status:
                type: string
                enum: [DRAFT, PENDING_REVIEW, APPROVED, REJECTED, SUPERSEDED]
              submitted_at: { type: string, format: date-time }
              reviewed_at: { type: [string, 'null'], format: date-time }
              version: { type: integer, minimum: 1 }
              product:
                type: object
                additionalProperties: false
                required: [code, id, name_vi]
                properties:
                  id: { type: string, format: uuid }
                  code: { $ref: '#/components/schemas/CatalogCode' }
                  name_vi: { type: string }
              requirement:
                type: object
                additionalProperties: false
                required: [blocking, code, document_type, id]
                properties:
                  id: { type: string, format: uuid }
                  code: { $ref: '#/components/schemas/CatalogCode' }
                  document_type: { type: string }
                  blocking: { type: boolean }
    HomeTarget:
      oneOf:
        - type: object
          required: [code, type]
          properties:
            code: { $ref: '#/components/schemas/CatalogCode' }
            type: { type: string, enum: [BRAND, CATEGORY, PAGE, PRODUCT] }
        - type: object
          required: [type, url]
          properties:
            type: { type: string, enum: [EXTERNAL] }
            url: { type: string, format: uri, pattern: '^https://' }
        - type: 'null'
    HomeModule:
      allOf:
        - $ref: '#/components/schemas/LocaleResolution'
        - type: object
          required:
            - background_config
            - button_label
            - content_config
            - id
            - items
            - media
            - module_type
            - summary
            - target
            - title
          properties:
            id: { type: string, format: uuid }
            module_type:
              type: string
              enum: [BANNER, BRAND_GRID, CATEGORY_GRID, HERO, PRODUCT_GRID, RICH_TEXT]
            title: { type: [string, 'null'] }
            summary: { type: [string, 'null'] }
            button_label: { type: [string, 'null'] }
            background_config:
              type: object
              properties:
                color: { type: [string, 'null'] }
                overlay: { type: [number, 'null'], minimum: 0, maximum: 1 }
            content_config:
              type: object
              properties:
                eyebrow: { type: string }
                layout: { type: string, enum: [CAROUSEL, GRID, STACK] }
            target: { $ref: '#/components/schemas/HomeTarget' }
            media: { type: array, items: { $ref: '#/components/schemas/PublicMediaObject' } }
            items:
              type: array
              items:
                oneOf:
                  - $ref: '#/components/schemas/Brand'
                  - $ref: '#/components/schemas/Category'
                  - $ref: '#/components/schemas/ProductSummary'
    StoreTheme:
      type: [object, 'null']
      required: [color_tokens, radius_tokens, typography_tokens, version]
      properties:
        color_tokens: { type: object }
        radius_tokens: { type: object }
        typography_tokens: { type: object }
        version: { type: integer, minimum: 1 }
    PublicStorefront:
      type: object
      required: [code, industry, name, short_description, theme]
      properties:
        code: { $ref: '#/components/schemas/CatalogCode' }
        industry: { type: string, enum: [BEAUTY, FASHION] }
        name: { type: string }
        short_description: { type: [string, 'null'] }
        theme: { $ref: '#/components/schemas/StoreTheme' }
    HomePage:
      allOf:
        - $ref: '#/components/schemas/LocaleResolution'
        - type: object
          required: [modules, store, version]
          properties:
            version: { type: integer, minimum: 1 }
            store: { $ref: '#/components/schemas/PublicStorefront' }
            modules: { type: array, items: { $ref: '#/components/schemas/HomeModule' } }
    Error:
      type: object
      required: [code, correlation_id, message_key]
      properties:
        code:
          type: string
          enum:
            - AUTHENTICATION_REQUIRED
            - AUTHORIZATION_DENIED
            - CONFLICT
            - INPUT_INVALID
            - INTERNAL_ERROR
            - RESOURCE_NOT_FOUND
            - STORE_CONTEXT_INVALID
        correlation_id: { type: string }
        message_key: { type: string }
        details: { type: object }
